<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Summit Contracting provides licensed home renovation and contracting services with transparent pricing.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Summit Contracting — Licensed Home Contractor">
  <meta property="og:description" content="Summit Contracting provides licensed home renovation and contracting services with transparent pricing.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Summit Contracting — Licensed Home Contractor">
  <meta name="twitter:description" content="Summit Contracting provides licensed home renovation and contracting services with transparent pricing.">
  <meta name="theme-color" content="#1A1D21">
  <title>Summit Contracting — Licensed Home Contractor</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon/favicon.svg">
      <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/favicon/apple-touch-icon.png" />
<style>
    :root {
      --bg-dark: #1A1D21;
      --accent: #f0c66d;
      --nav-link-color: rgba(255,255,255,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg-dark);
      color: #f3efe8;
    }
    .fallback-shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    @media (max-width: 768px) {
      .fallback-shell { padding: 12px; }
    }
    .skip-link {
      position: absolute; left: -9999px; top: auto;
      padding: 8px 16px; background: #1a1a1a; color: #f0c66d;
      border-radius: 4px; z-index: 1000; text-decoration: none;
    }
    .skip-link:focus { left: 10px; top: 10px; }
    .fallback-header {
      display: grid;
      gap: 10px;
      margin: 3rem 0 1rem;
    }
    .fallback-header h1 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height: 1.05;
    }
    .fallback-nav a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .fallback-nav a:hover,
    .fallback-nav a:focus-visible {
      text-decoration: underline;
    }
    .fallback-copy {
      color: rgba(255,255,255,0.72);
      line-height: 1.6;
    }
    #loading { position: fixed; inset: 0; z-index: 9999; background: var(--bg-dark);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      transition: opacity 0.4s ease; }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading-spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 14px; }
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: .35rem;
      position: fixed; top: .65rem; left: .85rem; z-index: 100;
      font-size: .7rem; letter-spacing: .04em;
      color: var(--nav-link-color); text-decoration: none; transition: color .15s;
    }
    .back-link:hover,
    .back-link:focus-visible { color: var(--accent); text-decoration: underline; }
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <a href="#root" class="skip-link">Skip to content</a>
  <a href="https://davehomeassist.github.io/" class="back-link">&larr; DaveHomeAssist</a>
  <header class="fallback-shell fallback-header">
    <h1>Summit Contracting</h1>
    <nav class="fallback-nav" aria-label="Primary navigation">
      <a href="https://davehomeassist.github.io/">Back to DaveHomeAssist</a>
    </nav>
    <p class="fallback-copy">Licensed home contractor services with a browser-based quote and lead capture flow.</p>
  </header>
  <main class="fallback-shell">
    <div id="loading"><div id="loading-spinner"></div><div id="loading-text">Loading...</div></div>
    <div id="root">
      <noscript>
        <div style="padding:2rem 0;line-height:1.7;">
          <h2 style="font-size:1.4rem;margin-bottom:.5rem;color:#f0c66d;">Licensed Home Contractor</h2>
          <p class="fallback-copy" style="margin-bottom:1rem;">Summit Contracting — licensed, insured, and trusted by your neighbors since 2008. Serving the Philadelphia, PA area with professional home improvement services.</p>
          <h3 style="font-size:1.1rem;margin-bottom:.4rem;">Services</h3>
          <ul style="list-style:disc;padding-left:1.5rem;color:rgba(255,255,255,0.72);margin-bottom:1rem;">
            <li>Roofing &amp; Storm Damage Repair</li>
            <li>Siding Installation &amp; Repair</li>
            <li>Kitchen Remodeling</li>
            <li>Bathroom Renovations</li>
          </ul>
          <h3 style="font-size:1.1rem;margin-bottom:.4rem;">Get a Free Quote</h3>
          <p class="fallback-copy">
            Phone: <a href="tel:+12676653324" style="color:#f0c66d;">(267) 665-3324</a><br>
            Email: <a href="mailto:info@summitcontracting.com" style="color:#f0c66d;">info@summitcontracting.com</a><br>
            Location: Philadelphia, PA 19103<br>
            License: PA HIC #054321
          </p>
          <p style="color:rgba(255,255,255,0.4);font-size:.85rem;margin-top:1rem;">Enable JavaScript for the full interactive quote and lead capture experience.</p>
        </div>
      </noscript>
    </div>
  </main>
  <form name="quote" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="phone" />
    <input name="email" />
    <input name="service" />
    <textarea name="details"></textarea>
  </form>
  <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="/app.js"></script>
  <script>
    const el = document.getElementById('loading');
    const check = () => { if (document.getElementById('root').children.length > 0) { el.classList.add('hide'); setTimeout(() => el.remove(), 500); } else { requestAnimationFrame(check); } };
    requestAnimationFrame(check);
    setTimeout(() => { el.classList.add('hide'); }, 3000);
  </script>
</body>
</html>
